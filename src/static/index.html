<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Agent — Test Console</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --blue: #3b82f6;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --radius: 10px;
      --font: 'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent-hover);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-brand svg { width: 22px; height: 22px; }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      transition: all 0.15s;
    }
    nav a:hover, nav a.active { color: var(--text); background: var(--surface2); }
    nav a.active { color: var(--accent-hover); }
    .nav-spacer { flex: 1; }
    .nav-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.2rem 0.75rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Layout ── */
    .page { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; width: 100%; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
    }
    .card-header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .card-header h2 { font-size: 0.95rem; font-weight: 600; }
    .card-header .subtitle { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }
    .card-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; gap: 1.25rem; }

    /* ── Form ── */
    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.8rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    input, textarea, select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.9rem;
      padding: 0.6rem 0.9rem;
      transition: border-color 0.15s;
      width: 100%;
      resize: vertical;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }
    textarea { min-height: 130px; }

    /* ── Preset buttons ── */
    .presets { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .preset-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.3rem 0.7rem;
      transition: all 0.15s;
    }
    .preset-btn:hover { border-color: var(--accent); color: var(--accent-hover); }

    /* ── Submit ── */
    .btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Spinner ── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result panel ── */
    .result-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 3rem;
    }
    .result-empty svg { width: 48px; height: 48px; opacity: 0.3; }

    /* ── Status badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.processed { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge.escalated { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge.priority-urgent { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge.priority-high { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge.priority-medium { background: rgba(99,102,241,0.15); color: var(--accent-hover); }
    .badge.priority-low { background: rgba(148,163,184,0.15); color: var(--muted); }
    .badge.sentiment-frustrated { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge.sentiment-negative { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge.sentiment-neutral { background: rgba(148,163,184,0.15); color: var(--muted); }
    .badge.sentiment-positive { background: rgba(34,197,94,0.15); color: var(--green); }

    /* ── Metadata grid ── */
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .meta-item { background: var(--surface2); border-radius: 8px; padding: 0.75rem 1rem; }
    .meta-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
    .meta-value { font-size: 0.9rem; font-weight: 500; }

    /* ── Reply box ── */
    .reply-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-size: 0.875rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Confidence bar ── */
    .conf-bar-bg { background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; }
    .conf-bar-fill { background: var(--accent); border-radius: 4px; height: 100%; transition: width 0.5s ease; }

    /* ── Section label ── */
    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Followup card ── */
    .followup-notice {
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }
    .followup-notice svg { flex-shrink: 0; color: var(--amber); margin-top: 1px; }

    /* ── Error ── */
    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.85rem;
      color: var(--red);
    }

    /* ── Scrollable result panel ── */
    .result-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1.25rem; padding: 1.5rem; }

    /* ── Pipeline trace ── */
    .pipeline-steps { display: flex; flex-direction: column; gap: 0.5rem; }
    .pipeline-step {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--green);
    }
    .step-dot.skipped { background: var(--border); }
    .step-dot.escalated { background: var(--red); }

    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
    </svg>
    Support Agent
  </div>
  <a href="/" class="active">Test Console</a>
  <a href="/inbox">Inbox</a>
  <div class="nav-spacer"></div>
  <span class="nav-badge" id="nav-total">— emails processed</span>
</nav>

<div class="page">

  <!-- ── Left: Compose ── -->
  <div class="card">
    <div class="card-header">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-hover)" stroke-width="2">
        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      <div>
        <h2>Compose Test Email</h2>
        <div class="subtitle">Simulate an incoming customer email</div>
      </div>
    </div>
    <div class="card-body">

      <div class="field">
        <label>Quick Presets</label>
        <div class="presets">
          <button class="preset-btn" onclick="loadPreset('billing')">💳 Billing dispute</button>
          <button class="preset-btn" onclick="loadPreset('password')">🔑 Password reset</button>
          <button class="preset-btn" onclick="loadPreset('shipping')">📦 Missing order</button>
          <button class="preset-btn" onclick="loadPreset('legal')">⚠️ Legal threat</button>
          <button class="preset-btn" onclick="loadPreset('tech')">🔧 Tech issue</button>
          <button class="preset-btn" onclick="loadPreset('feedback')">💬 Feedback</button>
        </div>
      </div>

      <div class="field">
        <label>From (sender)</label>
        <input id="sender" type="text" placeholder="Jane Doe <jane.doe@example.com>" />
      </div>

      <div class="field">
        <label>Subject</label>
        <input id="subject" type="text" placeholder="Brief description of the issue" />
      </div>

      <div class="field">
        <label>Email Body</label>
        <textarea id="body" placeholder="Write the customer's message here…"></textarea>
      </div>

      <button class="btn" id="submitBtn" onclick="submitEmail()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        Send to Agent
      </button>

    </div>
  </div>

  <!-- ── Right: Result ── -->
  <div class="card" id="resultCard">

    <div class="card-header">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-hover)" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
      </svg>
      <div>
        <h2>Agent Output</h2>
        <div class="subtitle" id="resultSubtitle">Awaiting submission</div>
      </div>
    </div>

    <div id="resultEmpty" class="result-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-4M16 3l5 5-9 9H7v-5l9-9z"/>
      </svg>
      <div>Submit an email to see the agent's<br>classification, reply, and pipeline trace.</div>
    </div>

    <div id="resultContent" class="result-scroll" style="display:none;"></div>

  </div>
</div>

<script>
const PRESETS = {
  billing: {
    sender: 'john.smith@company.com',
    subject: 'Incorrect charge on my invoice',
    body: `Hello,\n\nI was charged $99 this month but I am on the $49 plan. Please review invoice #INV-20240315 and issue a refund for the difference.\n\nRegards,\nJohn Smith`
  },
  password: {
    sender: 'jane.doe@example.com',
    subject: 'Cannot log in to my account — account locked',
    body: `Hi Support,\n\nI have been trying to log in for the past hour but keep getting an error saying my account is locked. I haven't changed my password recently. Can you please help me unlock it?\n\nThanks,\nJane`
  },
  shipping: {
    sender: 'alex.nguyen@gmail.com',
    subject: 'Order #ORD-9847 has not arrived',
    body: `Hi,\n\nI placed order #ORD-9847 two weeks ago and tracking shows it was delivered last Thursday but I never received anything. I've checked with my neighbours and no one has it.\n\nPlease help,\nAlex`
  },
  legal: {
    sender: 'legal@bigcorp.com',
    subject: 'Legal notice — data breach',
    body: `To whom it may concern,\n\nWe have reason to believe our company data has been exposed due to a breach in your systems. We are prepared to involve our legal team if this is not resolved within 24 hours.\n\nBig Corp Legal Team`
  },
  tech: {
    sender: 'sarah.jones@startup.io',
    subject: 'API returning 429 errors constantly',
    body: `Hi,\n\nWe are on the Pro plan but our API keeps returning 429 rate limit errors even when we are well under what we thought the limits were. This is blocking our production deployment.\n\nCan you help urgently?\nSarah`
  },
  feedback: {
    sender: 'happy.customer@example.com',
    subject: 'Amazing support experience!',
    body: `Hello,\n\nI just wanted to say that Marcus from your support team was absolutely brilliant in helping me resolve my issue yesterday. He was patient, knowledgeable, and resolved everything in under 10 minutes.\n\nPlease pass on my thanks!\nA very happy customer`
  }
};

function loadPreset(key) {
  const p = PRESETS[key];
  document.getElementById('sender').value = p.sender;
  document.getElementById('subject').value = p.subject;
  document.getElementById('body').value = p.body;
}

function setLoading(loading) {
  const btn = document.getElementById('submitBtn');
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<div class="spinner"></div> Processing…'
    : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send to Agent`;
}

function confidenceColor(c) {
  if (c >= 0.8) return 'var(--green)';
  if (c >= 0.6) return 'var(--amber)';
  return 'var(--red)';
}

function renderResult(data) {
  const el = document.getElementById('resultContent');
  const subtitle = document.getElementById('resultSubtitle');
  subtitle.textContent = `Processed in ${data.processing_time_ms}ms · ID: ${data.email_id.slice(0,8)}…`;

  const confPct = Math.round(data.confidence * 100);

  const steps = [
    { label: 'Ingest', done: true },
    { label: 'Classify', done: true, note: data.intent },
    { label: 'Retrieve knowledge', done: !data.escalated || data.retrieved_docs },
    { label: 'Draft response', done: !data.escalated },
    { label: 'Review', done: !data.escalated },
    { label: data.escalated ? 'Escalate ↑' : 'Send', done: true, escalated: data.escalated },
  ];

  const stepsHtml = steps.map(s => `
    <div class="pipeline-step">
      <div class="step-dot ${s.escalated ? 'escalated' : s.done ? '' : 'skipped'}"></div>
      <span style="color: ${s.done ? 'var(--text)' : 'var(--border)'}">
        ${s.label}${s.note ? ` <span style="color:var(--muted)">· ${s.note}</span>` : ''}
      </span>
    </div>`).join('');

  const followupHtml = data.followup_scheduled ? `
    <div class="followup-notice">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <div>
        <strong style="color:var(--amber)">Follow-up scheduled</strong>
        <div style="margin-top:0.2rem;color:var(--muted)">${data.followup_note || ''}</div>
        ${data.followup_date ? `<div style="margin-top:0.2rem;font-size:0.78rem;color:var(--muted)">Due: ${new Date(data.followup_date).toLocaleDateString()}</div>` : ''}
      </div>
    </div>` : '';

  const escalationHtml = data.escalated && data.escalation_reason ? `
    <div class="error-box">
      <strong>Escalation reason:</strong> ${data.escalation_reason}
    </div>` : '';

  el.innerHTML = `
    <div class="section-label">Status &amp; Classification</div>

    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center">
      <span class="badge ${data.status}">${data.status}</span>
      <span class="badge priority-${data.priority}">${data.priority} priority</span>
      <span class="badge sentiment-${data.sentiment}">${data.sentiment}</span>
    </div>

    <div class="meta-grid">
      <div class="meta-item">
        <div class="meta-label">Intent</div>
        <div class="meta-value">${data.intent.replace('_', ' ')}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Confidence</div>
        <div class="meta-value" style="color:${confidenceColor(data.confidence)}">${confPct}%</div>
        <div style="margin-top:0.4rem">
          <div class="conf-bar-bg">
            <div class="conf-bar-fill" style="width:${confPct}%;background:${confidenceColor(data.confidence)}"></div>
          </div>
        </div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Processing time</div>
        <div class="meta-value">${data.processing_time_ms} ms</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Email ID</div>
        <div class="meta-value" style="font-size:0.78rem;font-family:monospace">${data.email_id.slice(0,18)}…</div>
      </div>
    </div>

    ${escalationHtml}
    ${followupHtml}

    <div class="section-label">Agent Reply</div>
    <div class="reply-box">${escapeHtml(data.reply)}</div>

    <div class="section-label">Pipeline Trace</div>
    <div class="pipeline-steps">${stepsHtml}</div>

    <div style="display:flex;gap:0.75rem;margin-top:0.5rem">
      <a href="/inbox" style="color:var(--accent-hover);font-size:0.82rem;text-decoration:none">
        → View in inbox
      </a>
    </div>
  `;

  document.getElementById('resultEmpty').style.display = 'none';
  el.style.display = 'flex';
  updateNavCount();
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function submitEmail() {
  const sender = document.getElementById('sender').value.trim();
  const subject = document.getElementById('subject').value.trim();
  const body = document.getElementById('body').value.trim();

  if (!sender || !subject || !body) {
    alert('Please fill in all fields.');
    return;
  }

  setLoading(true);
  document.getElementById('resultSubtitle').textContent = 'Running pipeline…';
  document.getElementById('resultEmpty').style.display = 'none';
  document.getElementById('resultContent').style.display = 'none';
  document.getElementById('resultEmpty').style.display = 'flex';
  document.getElementById('resultEmpty').innerHTML = `
    <div class="spinner" style="width:32px;height:32px;border-width:3px"></div>
    <div>Processing email through agent pipeline…</div>
  `;

  try {
    const res = await fetch('/api/v1/emails/process', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sender, subject, body }),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || `HTTP ${res.status}`);
    }

    const data = await res.json();
    renderResult(data);
  } catch (e) {
    document.getElementById('resultEmpty').innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="1.5" style="width:40px;height:40px">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <div style="color:var(--red)"><strong>Error</strong><br><span style="font-size:0.82rem">${e.message}</span></div>
    `;
    document.getElementById('resultEmpty').style.display = 'flex';
    document.getElementById('resultContent').style.display = 'none';
    document.getElementById('resultSubtitle').textContent = 'Error';
  } finally {
    setLoading(false);
  }
}

async function updateNavCount() {
  try {
    const stats = await fetch('/api/v1/emails/inbox/stats').then(r => r.json());
    document.getElementById('nav-total').textContent = `${stats.total} emails processed`;
  } catch {}
}

updateNavCount();
</script>
</body>
</html>
