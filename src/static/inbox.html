<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Agent — Inbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --surface3: #2a2f48;
      --border: #2e3250;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --blue: #3b82f6;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --radius: 10px;
      --font: 'Inter', system-ui, sans-serif;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand { font-weight: 700; font-size: 1rem; color: var(--accent-hover); display: flex; align-items: center; gap: 0.5rem; }
    .nav-brand svg { width: 22px; height: 22px; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.875rem; padding: 0.25rem 0.75rem; border-radius: 6px; transition: all 0.15s; }
    nav a:hover, nav a.active { color: var(--text); background: var(--surface2); }
    nav a.active { color: var(--accent-hover); }
    .nav-spacer { flex: 1; }
    .nav-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 0.2rem 0.75rem; font-size: 0.75rem; color: var(--muted); }

    /* ── Stats bar ── */
    .stats-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 2rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .stat { display: flex; flex-direction: column; gap: 0.1rem; }
    .stat-value { font-size: 1.4rem; font-weight: 700; }
    .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }

    /* ── Layout: inbox list + detail panel ── */
    .workspace { flex: 1; display: grid; grid-template-columns: 380px 1fr; overflow: hidden; height: calc(100vh - 56px - 64px); }

    /* ── Inbox list ── */
    .inbox-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .inbox-toolbar {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .search-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.82rem;
      padding: 0.4rem 0.75rem;
    }
    .search-input:focus { outline: none; border-color: var(--accent); }
    .filter-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.78rem;
      padding: 0.4rem 0.5rem;
      cursor: pointer;
    }
    .inbox-list { flex: 1; overflow-y: auto; }
    .inbox-empty { padding: 3rem; text-align: center; color: var(--muted); font-size: 0.875rem; }

    .email-row {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .email-row:hover { background: var(--surface2); }
    .email-row.active { background: var(--surface3); border-left: 3px solid var(--accent); }

    .email-row-top { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .email-sender { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email-time { font-size: 0.72rem; color: var(--muted); flex-shrink: 0; }
    .email-subject { font-size: 0.82rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email-row-bottom { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }

    /* ── Detail panel ── */
    .detail-panel { overflow-y: auto; display: flex; flex-direction: column; }
    .detail-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .detail-empty svg { width: 48px; height: 48px; opacity: 0.25; }

    .detail-header {
      padding: 1.25rem 1.75rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .detail-header h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.3rem; }
    .detail-header .detail-meta { font-size: 0.8rem; color: var(--muted); display: flex; gap: 1rem; flex-wrap: wrap; }

    .detail-body { padding: 1.5rem 1.75rem; display: flex; flex-direction: column; gap: 1.5rem; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 0.25rem; border-bottom: 1px solid var(--border); }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 500;
      padding: 0.6rem 1rem;
      transition: all 0.15s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent-hover); border-bottom-color: var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: flex; flex-direction: column; gap: 1rem; }

    /* ── Reused styles ── */
    .badge { display: inline-flex; align-items: center; gap: 0.35rem; border-radius: 20px; font-size: 0.72rem; font-weight: 600; padding: 0.2rem 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge.processed { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge.escalated { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge.priority-urgent { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge.priority-high { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge.priority-medium { background: rgba(99,102,241,0.15); color: var(--accent-hover); }
    .badge.priority-low { background: rgba(148,163,184,0.15); color: var(--muted); }
    .badge.sentiment-frustrated { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge.sentiment-negative { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge.sentiment-neutral { background: rgba(148,163,184,0.15); color: var(--muted); }
    .badge.sentiment-positive { background: rgba(34,197,94,0.15); color: var(--green); }

    .meta-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
    .meta-item { background: var(--surface2); border-radius: 8px; padding: 0.75rem 1rem; }
    .meta-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
    .meta-value { font-size: 0.88rem; font-weight: 500; }

    .text-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.7;
      padding: 1rem 1.25rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .reply-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      font-size: 0.875rem;
      line-height: 1.75;
      padding: 1rem 1.25rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .section-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); display: flex; align-items: center; gap: 0.5rem; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .doc-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8rem;
      line-height: 1.6;
      padding: 0.75rem 1rem;
    }
    .doc-item .doc-source { color: var(--accent-hover); font-weight: 600; margin-bottom: 0.3rem; font-size: 0.75rem; }

    .review-pass { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25); border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; }
    .review-fail { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; }

    .followup-notice { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.3); border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; display: flex; gap: 0.75rem; }
    .followup-notice svg { flex-shrink: 0; color: var(--amber); }

    .conf-bar-bg { background: var(--border); border-radius: 4px; height: 5px; overflow: hidden; }
    .conf-bar-fill { border-radius: 4px; height: 100%; transition: width 0.4s ease; }

    .refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.78rem;
      padding: 0.35rem 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: all 0.15s;
    }
    .refresh-btn:hover { color: var(--text); border-color: var(--accent); }

    @media (max-width: 900px) {
      .workspace { grid-template-columns: 1fr; height: auto; }
      .inbox-panel { height: 50vh; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
    </svg>
    Support Agent
  </div>
  <a href="/">Test Console</a>
  <a href="/inbox" class="active">Inbox</a>
  <div class="nav-spacer"></div>
  <button class="refresh-btn" onclick="loadInbox()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
    </svg>
    Refresh
  </button>
</nav>

<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-value" id="s-total">—</div><div class="stat-label">Total Emails</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--green)" id="s-processed">—</div><div class="stat-label">Processed</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--red)" id="s-escalated">—</div><div class="stat-label">Escalated</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--amber)" id="s-followups">—</div><div class="stat-label">Pending Follow-ups</div></div>
  <div class="stat"><div class="stat-value" style="color:var(--muted)" id="s-avgms">—</div><div class="stat-label">Avg Processing</div></div>
</div>

<div class="workspace">

  <!-- ── Inbox list ── -->
  <div class="inbox-panel">
    <div class="inbox-toolbar">
      <input class="search-input" id="searchInput" placeholder="Search sender, subject…" oninput="filterRows()" />
      <select class="filter-select" id="filterStatus" onchange="filterRows()">
        <option value="">All</option>
        <option value="processed">Processed</option>
        <option value="escalated">Escalated</option>
      </select>
      <select class="filter-select" id="filterPriority" onchange="filterRows()">
        <option value="">Priority</option>
        <option value="urgent">Urgent</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </div>
    <div class="inbox-list" id="inboxList">
      <div class="inbox-empty">Loading emails…</div>
    </div>
  </div>

  <!-- ── Detail panel ── -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty" id="detailEmpty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
      <div>Select an email to view details</div>
    </div>
    <div id="detailContent" style="display:none; flex-direction:column; flex:1">
    </div>
  </div>

</div>

<script>
let allEmails = [];
let activeId = null;

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return d.toLocaleDateString();
}

function senderName(s) {
  const m = s.match(/^(.+?)\s*</);
  return m ? m[1].replace(/"/g,'').trim() : s.split('@')[0];
}

function escapeHtml(t) {
  return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function confidenceColor(c) {
  if (c >= 0.8) return 'var(--green)';
  if (c >= 0.6) return 'var(--amber)';
  return 'var(--red)';
}

async function loadStats() {
  try {
    const s = await fetch('/api/v1/emails/inbox/stats').then(r => r.json());
    document.getElementById('s-total').textContent = s.total;
    document.getElementById('s-processed').textContent = s.processed;
    document.getElementById('s-escalated').textContent = s.escalated;
    document.getElementById('s-followups').textContent = s.pending_followups;
    document.getElementById('s-avgms').textContent = s.avg_processing_ms + ' ms';
  } catch {}
}

async function loadInbox() {
  try {
    allEmails = await fetch('/api/v1/emails/inbox').then(r => r.json());
    renderList(allEmails);
    loadStats();
  } catch(e) {
    document.getElementById('inboxList').innerHTML = `<div class="inbox-empty">Failed to load emails.<br><small>${e.message}</small></div>`;
  }
}

function renderList(emails) {
  const list = document.getElementById('inboxList');
  if (!emails.length) {
    list.innerHTML = `<div class="inbox-empty">No emails yet.<br><a href="/" style="color:var(--accent-hover)">Send a test email →</a></div>`;
    return;
  }
  list.innerHTML = emails.map(e => `
    <div class="email-row${e.email_id === activeId ? ' active' : ''}" onclick="openEmail('${e.email_id}')" id="row-${e.email_id}">
      <div class="email-row-top">
        <span class="email-sender">${escapeHtml(senderName(e.sender))}</span>
        <span class="email-time">${fmtTime(e.received_at)}</span>
      </div>
      <div class="email-subject">${escapeHtml(e.subject)}</div>
      <div class="email-row-bottom">
        <span class="badge ${e.status}">${e.status}</span>
        <span class="badge priority-${e.priority}">${e.priority}</span>
        <span class="badge sentiment-${e.sentiment}">${e.sentiment}</span>
        ${e.followup_scheduled ? '<span class="badge" style="background:rgba(245,158,11,0.15);color:var(--amber)">⏰ follow-up</span>' : ''}
      </div>
    </div>
  `).join('');
}

function filterRows() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const priority = document.getElementById('filterPriority').value;
  const filtered = allEmails.filter(e => {
    const textMatch = !q || e.sender.toLowerCase().includes(q) || e.subject.toLowerCase().includes(q);
    const statusMatch = !status || e.status === status;
    const priorityMatch = !priority || e.priority === priority;
    return textMatch && statusMatch && priorityMatch;
  });
  renderList(filtered);
}

async function openEmail(emailId) {
  activeId = emailId;
  document.querySelectorAll('.email-row').forEach(r => r.classList.remove('active'));
  const row = document.getElementById('row-' + emailId);
  if (row) row.classList.add('active');

  document.getElementById('detailEmpty').style.display = 'none';
  const content = document.getElementById('detailContent');
  content.style.display = 'flex';
  content.innerHTML = `<div style="padding:3rem;text-align:center;color:var(--muted)">Loading details…</div>`;

  try {
    const e = await fetch('/api/v1/emails/' + emailId + '/details').then(r => r.json());
    renderDetail(e, content);
  } catch(err) {
    content.innerHTML = `<div style="padding:2rem;color:var(--red)">Failed to load: ${err.message}</div>`;
  }
}

function renderDetail(e, container) {
  const confPct = Math.round(e.confidence * 100);

  const docsHtml = e.retrieved_docs && e.retrieved_docs.length
    ? e.retrieved_docs.map(d => {
        const m = d.match(/^\[(.+?)\]\n([\s\S]*)/);
        return m
          ? `<div class="doc-item"><div class="doc-source">${escapeHtml(m[1])}</div>${escapeHtml(m[2].trim())}</div>`
          : `<div class="doc-item">${escapeHtml(d)}</div>`;
      }).join('')
    : '<div style="color:var(--muted);font-size:0.85rem">No documents retrieved.</div>';

  const reviewHtml = e.review_passed
    ? `<div class="review-pass"><strong style="color:var(--green)">✓ Review passed</strong> — ${escapeHtml(e.review_feedback)}</div>`
    : `<div class="review-fail"><strong style="color:var(--red)">✗ Review failed / escalated</strong> — ${escapeHtml(e.review_feedback)}</div>`;

  const followupHtml = e.followup_scheduled ? `
    <div class="followup-notice">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <div>
        <strong style="color:var(--amber)">Follow-up scheduled</strong>
        ${e.followup_note ? `<div style="color:var(--muted);margin-top:0.15rem">${escapeHtml(e.followup_note)}</div>` : ''}
        ${e.followup_date ? `<div style="font-size:0.75rem;color:var(--muted);margin-top:0.15rem">Due: ${new Date(e.followup_date).toLocaleDateString(undefined, {weekday:'short',year:'numeric',month:'short',day:'numeric'})}</div>` : ''}
      </div>
    </div>` : '';

  container.innerHTML = `
    <div class="detail-header">
      <h2>${escapeHtml(e.subject)}</h2>
      <div class="detail-meta">
        <span>From: ${escapeHtml(e.sender)}</span>
        <span>${new Date(e.received_at).toLocaleString()}</span>
        <span style="font-family:monospace;font-size:0.72rem">${e.email_id}</span>
      </div>
      <div style="display:flex;gap:0.5rem;margin-top:0.75rem;flex-wrap:wrap">
        <span class="badge ${e.status}">${e.status}</span>
        <span class="badge priority-${e.priority}">${e.priority} priority</span>
        <span class="badge sentiment-${e.sentiment}">${e.sentiment}</span>
        <span class="badge" style="background:var(--surface3);color:var(--muted)">${e.intent.replace(/_/g,' ')}</span>
      </div>
    </div>

    <div class="detail-body">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('reply', this)">Agent Reply</button>
        <button class="tab-btn" onclick="switchTab('original', this)">Original Email</button>
        <button class="tab-btn" onclick="switchTab('pipeline', this)">Pipeline Details</button>
        <button class="tab-btn" onclick="switchTab('knowledge', this)">Knowledge Retrieved</button>
      </div>

      <!-- Tab: Reply -->
      <div class="tab-content active" id="tab-reply">
        ${followupHtml}
        <div class="section-label">Final Response Sent to Customer</div>
        <div class="reply-block">${escapeHtml(e.final_response)}</div>
      </div>

      <!-- Tab: Original -->
      <div class="tab-content" id="tab-original">
        <div class="meta-grid">
          <div class="meta-item" style="grid-column:1/-1">
            <div class="meta-label">From</div>
            <div class="meta-value">${escapeHtml(e.sender)}</div>
          </div>
          <div class="meta-item" style="grid-column:1/-1">
            <div class="meta-label">Subject</div>
            <div class="meta-value">${escapeHtml(e.subject)}</div>
          </div>
        </div>
        <div class="section-label">Email Body (cleaned)</div>
        <div class="text-block">${escapeHtml(e.body)}</div>
      </div>

      <!-- Tab: Pipeline -->
      <div class="tab-content" id="tab-pipeline">
        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">Intent</div>
            <div class="meta-value">${e.intent.replace(/_/g,' ')}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Priority</div>
            <div class="meta-value">${e.priority}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Sentiment</div>
            <div class="meta-value">${e.sentiment}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Confidence</div>
            <div class="meta-value" style="color:${confidenceColor(e.confidence)}">${confPct}%</div>
            <div style="margin-top:0.4rem">
              <div class="conf-bar-bg">
                <div class="conf-bar-fill" style="width:${confPct}%;background:${confidenceColor(e.confidence)}"></div>
              </div>
            </div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Escalated</div>
            <div class="meta-value" style="color:${e.escalated ? 'var(--red)' : 'var(--green)'}">${e.escalated ? 'Yes' : 'No'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Human Review</div>
            <div class="meta-value" style="color:${e.needs_human_review ? 'var(--amber)' : 'var(--green)'}">${e.needs_human_review ? 'Required' : 'Not needed'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Processing</div>
            <div class="meta-value">${e.processing_time_ms} ms</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Docs Retrieved</div>
            <div class="meta-value">${e.retrieved_docs ? e.retrieved_docs.length : 0}</div>
          </div>
        </div>

        ${e.escalation_reason ? `
        <div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:8px;padding:0.75rem 1rem;font-size:0.85rem">
          <strong style="color:var(--red)">Escalation reason:</strong> ${escapeHtml(e.escalation_reason)}
        </div>` : ''}

        <div class="section-label">Review Decision</div>
        ${reviewHtml}

        ${e.draft_response ? `
        <div class="section-label">Draft Response (before review)</div>
        <div class="text-block" style="opacity:0.7">${escapeHtml(e.draft_response)}</div>` : ''}
      </div>

      <!-- Tab: Knowledge -->
      <div class="tab-content" id="tab-knowledge">
        <div class="section-label">Retrieved Knowledge Base Excerpts (${e.retrieved_docs ? e.retrieved_docs.length : 0})</div>
        <div style="display:flex;flex-direction:column;gap:0.75rem">
          ${docsHtml}
        </div>
      </div>

    </div>
  `;
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

loadInbox();
// Auto-refresh every 15 seconds
setInterval(loadInbox, 15000);
</script>
</body>
</html>
